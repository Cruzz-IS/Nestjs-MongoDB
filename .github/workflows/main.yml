name: NestJS CI/CD

on:
  push:
    branches: [ main ] # Se activa al subir a la rama main
  pull_request:
    branches: [ main ] # Se activa al crear un PR

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Usamos un servidor Linux virtual
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Descarga el codigo del repositorio
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versión de Node
          cache: 'npm'
          
      - name: Instalar dependencias
        run: npm install
        
      - name: Correr tests unitarios
        run: npm run test
        
      - name: Correr tests e2e
        run: npm run test:e2e -- --forceExit
        env:
          MONGODB_URI: mongodb://localhost:27017/test

      - name: Start NestJS App 
        # Lo corremos de fondo para que k6 pueda atacarlo
        run: |
          # Iniciamos la app y guardamos los logs en un archivo para ver si hay errores
          npm run start > app.log 2>&1 & 
          
          # Esperamos a que el PUERTO responda (independientemente de si devuelve 401 o 200)
          # Usamos tcp:3000 que es más confiable que http si hay seguridad de por medio
          npx wait-on tcp:3000 --timeout 60000
        env:
          MONGO_URI: mongodb://localhost:27017/test_db
          PORT: 3000
          
      - name: Mostrar logs de error si la app no inició
        if: failure()
        run: cat app.log

      - name: Wait for NestJS to be ready
        run: npx wait-on http://localhost:3000/posts --timeout 30000

      - name: Setup k6
        uses: grafana/setup-k6-action@v1 # Configura k6 para pruebas de carga

      - name: Correr tests de carga con K6
        run: k6 run load-test.js